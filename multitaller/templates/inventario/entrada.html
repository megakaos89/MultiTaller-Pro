{% extends "base.html" %}

{% block title %}Entrada de Pieza - MultiTaller{% endblock %}

{% block content %}
<h2 class="mb-4">📥 Registrar Entrada de Pieza</h2>

<div class="card">
    <div class="card-body">
        <p><strong>Pieza:</strong> {{ pieza.nombre }} (Stock actual: {{ pieza.cantidad }})</p>
        
        <form method="POST">
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Cantidad a Ingresar</label>
                    <input type="number" class="form-control" name="cantidad" min="1" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Precio Costo Unitario</label>
                    <input type="number" step="0.01" class="form-control" name="precio_costo" value="{{ pieza.precio_costo }}" required>
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Proveedor</label>
                <select class="form-select" name="proveedor_id">
                    <option value="">Seleccionar proveedor...</option>
                    {% for prov in proveedores %}
                    <option value="{{ prov.id }}">{{ prov.nombre_completo or prov.razon_social }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Notas</label>
                <textarea class="form-control" name="notas" rows="2"></textarea>
            </div>
            
            <button type="submit" class="btn btn-success">Registrar Entrada</button>
            <a href="{{ url_for('inventario.ver_pieza', id=pieza.id) }}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
