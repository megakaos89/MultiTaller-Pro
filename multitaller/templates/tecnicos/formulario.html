{% extends "base.html" %}

{% block title %}{% if tecnico %}Editar Técnico{% else %}Nuevo Técnico{% endif %} - MultiTaller{% endblock %}

{% block content %}
<h2 class="mb-4">{% if tecnico %}✏️ Editar Técnico{% else %}➕ Nuevo Técnico{% endif %}</h2>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre *</label>
                <input type="text" class="form-control" id="nombre" name="nombre" 
                       value="{{ tecnico.nombre if tecnico else '' }}" required>
            </div>
            
            <div class="mb-3">
                <label for="especialidad" class="form-label">Especialidad</label>
                <input type="text" class="form-control" id="especialidad" name="especialidad"
                       value="{{ tecnico.especialidad if tecnico else '' }}">
            </div>
            
            <div class="mb-3">
                <label for="costo_hora" class="form-label">Costo por Hora ($)</label>
                <input type="number" class="form-control" id="costo_hora" name="costo_hora"
                       value="{{ tecnico.costo_hora if tecnico else 0 }}" step="0.01" min="0">
            </div>
            
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    {% if tecnico %}Actualizar{% else %}Guardar{% endif %}
                </button>
                <a href="{{ url_for('tecnicos.listar_tecnicos') }}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
