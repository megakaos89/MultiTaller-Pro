{% extends "base.html" %}

{% block title %}{% if editando %}Editar{% else %}Nuevo{% endif %} Cliente - MultiTaller{% endblock %}

{% block content %}
<h2 class="mb-4">{% if editando %}✏️ Editar{% else %}➕ Nuevo{% endif %} Cliente</h2>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Nombres *</label>
                    <input type="text" class="form-control" name="nombres" value="{{ cliente.nombres if cliente else '' }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Apellidos *</label>
                    <input type="text" class="form-control" name="apellidos" value="{{ cliente.apellidos if cliente else '' }}" required>
                </div>
            </div>
            
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Teléfono Móvil</label>
                    <input type="text" class="form-control" name="telefono_movil" value="{{ cliente.telefono_movil if cliente else '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Teléfono Fijo</label>
                    <input type="text" class="form-control" name="telefono_fijo" value="{{ cliente.telefono_fijo if cliente else '' }}">
                </div>
            </div>
            
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Dirección</label>
                    <input type="text" class="form-control" name="direccion" value="{{ cliente.direccion if cliente else '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Tipo Cliente</label>
                    <select class="form-select" name="tipo_cliente">
                        <option value="Persona natural" {% if cliente and cliente.tipo_cliente == 'Persona natural' %}selected{% endif %}>Persona natural</option>
                        <option value="Mipyme" {% if cliente and cliente.tipo_cliente == 'Mipyme' %}selected{% endif %}>Mipyme</option>
                        <option value="Empresa estatal" {% if cliente and cliente.tipo_cliente == 'Empresa estatal' %}selected{% endif %}>Empresa estatal</option>
                        <option value="CPA" {% if cliente and cliente.tipo_cliente == 'CPA' %}selected{% endif %}>CPA</option>
                        <option value="CNA" {% if cliente and cliente.tipo_cliente == 'CNA' %}selected{% endif %}>CNA</option>
                        <option value="PDL" {% if cliente and cliente.tipo_cliente == 'PDL' %}selected{% endif %}>PDL</option>
                    </select>
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Identificación</label>
                <input type="text" class="form-control" name="identificacion" value="{{ cliente.identificacion if cliente else '' }}">
            </div>
            
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Guardar</button>
                <a href="{{ url_for('clientes.listar_clientes') }}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
