{% extends "base.html" %}

{% block title %}Editar Configuración - MultiTaller{% endblock %}

{% block content %}
<h2 class="mb-4">⚙️ Editar Configuración</h2>

<div class="card">
    <div class="card-body">
        <form method="POST" action="{{ url_for('configuracion.editar_configuracion') }}">
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Nombre del Taller</label>
                    <input type="text" class="form-control" name="nombre_taller" value="{{ configs.get('nombre_taller', '') }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Teléfono</label>
                    <input type="text" class="form-control" name="telefono" value="{{ configs.get('telefono', '') }}">
                </div>
            </div>
            
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" name="email" value="{{ configs.get('email', '') }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Dirección</label>
                    <input type="text" class="form-control" name="direccion" value="{{ configs.get('direccion', '') }}">
                </div>
            </div>
            
            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">Moneda Principal</label>
                    <select class="form-select" name="moneda_principal">
                        <option value="USD" {% if configs.get('moneda_principal') == 'USD' %}selected{% endif %}>USD</option>
                        <option value="EUR" {% if configs.get('moneda_principal') == 'EUR' %}selected{% endif %}>EUR</option>
                        <option value="MXN" {% if configs.get('moneda_principal') == 'MXN' %}selected{% endif %}>MXN</option>
                        <option value="COP" {% if configs.get('moneda_principal') == 'COP' %}selected{% endif %}>COP</option>
                        <option value="ARS" {% if configs.get('moneda_principal') == 'ARS' %}selected{% endif %}>ARS</option>
                        <option value="CLP" {% if configs.get('moneda_principal') == 'CLP' %}selected{% endif %}>CLP</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Símbolo de Moneda</label>
                    <input type="text" class="form-control" name="moneda_simbolo" value="{{ configs.get('moneda_simbolo', '$') }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">IVA (%)</label>
                    <input type="number" step="0.01" class="form-control" name="iva_porcentaje" value="{{ configs.get('iva_porcentaje', 0) }}">
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary">Guardar Cambios</button>
            <a href="{{ url_for('configuracion.ver_configuracion') }}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
