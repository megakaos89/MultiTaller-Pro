{% extends "base.html" %}
{% block title %}Activar Licencia - MultiTaller{% endblock %}
{% block content %}
<h2 class="mb-4">🔑 Activar Licencia</h2>
<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Código de Licencia</label>
                <input type="text" class="form-control" name="codigo_licencia" required>
            </div>
            <button type="submit" class="btn btn-primary">Activar</button>
        </form>
    </div>
</div>
{% endblock %}
