{% extends "base.html" %}

{% block title %}{% if editando %}Editar{% else %}Nuevo{% endif %} Contrato - MultiTaller{% endblock %}

{% block content %}
<h2 class="mb-4">{% if editando %}✏️ Editar{% else %}➕ Nuevo{% endif %} Contrato</h2>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Cliente</label>
                    <select class="form-select" name="cliente_id" required>
                        <option value="">Seleccionar cliente...</option>
                        {% for cliente in clientes %}
                        <option value="{{ cliente.id }}" {% if contrato and contrato.cliente_id == cliente.id %}selected{% endif %}>{{ cliente.nombre_completo }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Frecuencia</label>
                    <select class="form-select" name="frecuencia" required>
                        <option value="">Seleccionar frecuencia...</option>
                        {% for freq in frecuencias %}
                        <option value="{{ freq }}" {% if contrato and contrato.frecuencia == freq %}selected{% endif %}>{{ freq|capitalize }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            
            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">Fecha Inicio</label>
                    <input type="date" class="form-control" name="fecha_inicio" value="{{ contrato.fecha_inicio.strftime('%Y-%m-%d') if contrato and contrato.fecha_inicio else '' }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Fecha Fin</label>
                    <input type="date" class="form-control" name="fecha_fin" value="{{ contrato.fecha_fin.strftime('%Y-%m-%d') if contrato and contrato.fecha_fin else '' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Precio</label>
                    <input type="number" step="0.01" class="form-control" name="precio" value="{{ contrato.precio if contrato else '' }}" required>
                </div>
            </div>
            
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Cantidad de Equipos</label>
                    <input type="number" class="form-control" name="cantidad_equipos" value="{{ contrato.cantidad_equipos if contrato else 1 }}" min="1">
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary">{% if editando %}Actualizar{% else %}Crear{% endif %}</button>
            <a href="{{ url_for('contratos.listar_contratos') }}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
