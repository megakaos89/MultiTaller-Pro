{% extends "base.html" %}

{% block title %}{% if editando %}Editar{% else %}Nuevo{% endif %} Contrato - MultiTaller{% endblock %}

{% block content %}
<h2 class="mb-4">{% if editando %}✏️ Editar{% else %}➕ Nuevo{% endif %} Contrato</h2>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Cliente</label>
                    <select class="form-select" name="cliente_id" required>
                        <option value="">Seleccionar cliente...</option>
                        {% for cliente in clientes %}
                        <option value="{{ cliente.id }}" {% if contrato and contrato.cliente_id == cliente.id %}selected{% endif %}>{{ cliente.nombre_completo }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Tipo de Servicio</label>
                    <select class="form-select" name="tipo_servicio" required>
                        <option value="">Seleccionar...</option>
                        <option value="Mantenimiento preventivo" {% if contrato and contrato.tipo_servicio == 'Mantenimiento preventivo' %}selected{% endif %}>Mantenimiento preventivo</option>
                        <option value="Soporte técnico" {% if contrato and contrato.tipo_servicio == 'Soporte técnico' %}selected{% endif %}>Soporte técnico</option>
                        <option value="Garantía extendida" {% if contrato and contrato.tipo_servicio == 'Garantía extendida' %}selected{% endif %}>Garantía extendida</option>
                        <option value="Servicio mensual" {% if contrato and contrato.tipo_servicio == 'Servicio mensual' %}selected{% endif %}>Servicio mensual</option>
                    </select>
                </div>
            </div>
            
            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">Fecha Inicio</label>
                    <input type="date" class="form-control" name="fecha_inicio" value="{{ contrato.fecha_inicio.strftime('%Y-%m-%d') if contrato and contrato.fecha_inicio else '' }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Fecha Fin</label>
                    <input type="date" class="form-control" name="fecha_fin" value="{{ contrato.fecha_fin.strftime('%Y-%m-%d') if contrato and contrato.fecha_fin else '' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Valor Total</label>
                    <input type="number" step="0.01" class="form-control" name="valor_total" value="{{ contrato.valor_total if contrato else '' }}" required>
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Descripción</label>
                <textarea class="form-control" name="descripcion" rows="3">{{ contrato.descripcion if contrato else '' }}</textarea>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Términos y Condiciones</label>
                <textarea class="form-control" name="terminos_condiciones" rows="4">{{ contrato.terminos_condiciones if contrato else '' }}</textarea>
            </div>
            
            <button type="submit" class="btn btn-primary">{% if editando %}Actualizar{% else %}Crear{% endif %}</button>
            <a href="{{ url_for('contratos.listar_contratos') }}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
