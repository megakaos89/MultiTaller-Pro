{% extends "base.html" %}

{% block title %}{% if editando %}Editar{% else %}Nuevo{% endif %} Gasto - MultiTaller{% endblock %}

{% block content %}
<h2 class="mb-4">{% if editando %}✏️ Editar{% else %}➕ Nuevo{% endif %} Gasto</h2>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">Fecha</label>
                    <input type="date" class="form-control" name="fecha" value="{{ gasto.fecha.strftime('%Y-%m-%d') if gasto else '' }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Categoría</label>
                    <select class="form-select" name="categoria_id" required>
                        <option value="">Seleccionar...</option>
                        {% for cat in categorias %}
                        <option value="{{ cat.id }}" {% if gasto and gasto.categoria_id == cat.id %}selected{% endif %}>{{ cat.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Monto</label>
                    <input type="number" step="0.01" class="form-control" name="monto" value="{{ gasto.monto if gasto else '' }}" required>
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Descripción</label>
                <textarea class="form-control" name="descripcion" rows="3" required>{{ gasto.descripcion if gasto else '' }}</textarea>
            </div>
            
            <button type="submit" class="btn btn-primary">{% if editando %}Actualizar{% else %}Crear{% endif %}</button>
            <a href="{{ url_for('gastos.listar_gastos') }}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
