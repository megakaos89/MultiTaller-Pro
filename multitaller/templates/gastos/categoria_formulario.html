{% extends "base.html" %}

{% block title %}{% if categoria %}Editar{% else %}Nueva{% endif %} Categoría - MultiTaller{% endblock %}

{% block content %}
<h2 class="mb-4">{% if categoria %}✏️ Editar{% else %}➕ Nueva{% endif %} Categoría</h2>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Nombre</label>
                <input type="text" class="form-control" name="nombre" value="{{ categoria.nombre if categoria else '' }}" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Descripción</label>
                <textarea class="form-control" name="descripcion" rows="3">{{ categoria.descripcion if categoria else '' }}</textarea>
            </div>
            
            <button type="submit" class="btn btn-primary">{% if categoria %}Actualizar{% else %}Crear{% endif %}</button>
            <a href="{{ url_for('gastos.gestionar_categorias') }}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
