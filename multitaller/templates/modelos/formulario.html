{% extends "base.html" %}

{% block title %}{% if editando %}Editar{% else %}Nuevo{% endif %} Modelo - MultiTaller{% endblock %}

{% block content %}
<h2 class="mb-4">{% if editando %}✏️ Editar{% else %}➕ Nuevo{% endif %} Modelo de Equipo</h2>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Marca</label>
                    <input type="text" class="form-control" name="marca" value="{{ modelo.marca if modelo else '' }}" required list="marcas_list">
                    <datalist id="marcas_list">
                        <option value="HP">
                        <option value="Dell">
                        <option value="Lenovo">
                        <option value="Apple">
                        <option value="Asus">
                        <option value="Acer">
                        <option value="Samsung">
                    </datalist>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Nombre del Modelo</label>
                    <input type="text" class="form-control" name="modelo" value="{{ modelo.modelo if modelo else '' }}" required>
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Tipo de Equipo</label>
                <select class="form-select" name="tipo" required>
                    <option value="">Seleccionar...</option>
                    {% for tipo_opcion in tipos_equipo %}
                    <option value="{{ tipo_opcion }}" {% if modelo and modelo.tipo == tipo_opcion %}selected{% endif %}>{{ tipo_opcion }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Especificaciones</label>
                <textarea class="form-control" name="especificaciones" rows="3">{{ modelo.especificaciones if modelo else '' }}</textarea>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Problemas Frecuentes</label>
                <textarea class="form-control" name="problemas_frecuentes" rows="2">{{ modelo.problemas_frecuentes if modelo else '' }}</textarea>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Notas de Servicio</label>
                <textarea class="form-control" name="notas_servicio" rows="2">{{ modelo.notas_servicio if modelo else '' }}</textarea>
            </div>
            
            <button type="submit" class="btn btn-primary">{% if editando %}Actualizar{% else %}Crear{% endif %}</button>
            <a href="{{ url_for('modelos.listar_modelos') }}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
